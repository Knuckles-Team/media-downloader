[build-system]
requires = ["setuptools>=80.9.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "media-downloader"
version = "2.2.21"
description = "Download audio/videos from the internet!\nHost an MCP Server for Agentic AI to download videos!"
readme = "README.md"
authors = [{ name = "Audel Rouhi", email = "knucklessg1@gmail.com" }]
license = { text = "MIT" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: Public Domain",
    "Environment :: Console",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
]
requires-python = ">=3.10"
dependencies = [
    "agent-utilities>=0.2.8",
    "yt-dlp[default]>=2025.12.08",
]

[project.optional-dependencies]
mcp = [
    "agent-utilities[mcp]>=0.2.8",
]

agent = [
    "agent-utilities[agent,logfire]>=0.2.8",
]

all = [
    "agent-utilities[mcp,agent,logfire]>=0.2.8",
]

[project.scripts]
media-downloader = "media_downloader.media_downloader:media_downloader"
media-downloader-mcp = "media_downloader.mcp:mcp_server"
media-downloader-agent = "media_downloader.agent:agent_server"

[tool.setuptools.package-data]
media_downloader = [ "mcp_config.json", "skills/**", "agent/**",]

[tool.setuptools.packages.find]
where = ["."]
