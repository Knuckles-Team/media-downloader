[bumpversion]
current_version = 3.0.1
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = media-downloader[mcp]>={current_version}
replace = media-downloader[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = media-downloader[agent]>={current_version}
replace = media-downloader[agent]>={new_version}

[bumpversion:file:media_downloader/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:media_downloader/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:media_downloader/media_downloader.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
