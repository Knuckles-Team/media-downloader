---
services:
  media-downloader-agent:
    # image: docker.io/knucklessg1/media-downloader:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: media-downloader-agent
    hostname: media-downloader-agent
    command: [ "media-downloader-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9797"
      - "TRANSPORT=stdio"
      - "DOWNLOAD_DIRECTORY=/downloads"
      - "AUDIO_ONLY=false"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=http://ollama:11434/v1"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=nvidia/nemotron-3-super"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9797:9797"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9797/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
